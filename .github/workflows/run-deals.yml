name: Run Deals Channel

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build message output without posting to Telegram"
        required: true
        type: boolean
        default: true
      limit:
        description: "Maximum deals to process"
        required: true
        type: number
        default: 10
      skip_affiliate:
        description: "Skip Cuelinks wrapping for Telegram delivery tests"
        required: true
        type: boolean
        default: false
  schedule:
    # Runs every 15 minutes (UTC). GitHub cron may be delayed during high load.
    - cron: "*/15 * * * *"

jobs:
  run-deals:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: deals-channel-${{ github.repository }}
      cancel-in-progress: false

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      CUELINKS_CHANNEL_ID: ${{ secrets.CUELINKS_CHANNEL_ID }}
      GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
      CUELINKS_API_TOKEN: ${{ secrets.CUELINKS_API_TOKEN }}
      CUELINKS_OFFERS_URL: ${{ secrets.CUELINKS_OFFERS_URL }}
      CUELINKS_OFFERS_ITEMS_PATH: ${{ secrets.CUELINKS_OFFERS_ITEMS_PATH }}
      CUELINKS_OFFERS_CATEGORY: ${{ secrets.CUELINKS_OFFERS_CATEGORY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare dedupe directory
        run: mkdir -p out

      - name: Restore posted-deals dedupe cache
        id: dedupe_cache
        uses: actions/cache/restore@v4
        with:
          path: out/posted_deals.json
          key: deals-posted-${{ github.repository }}
          restore-keys: |
            deals-posted-${{ github.repository }}
            deals-posted-

      - name: Init dedupe file if cache miss
        run: |
          if [ ! -f out/posted_deals.json ]; then
            echo '{"keys": []}' > out/posted_deals.json
            echo "No dedupe cache yet — starting with empty posted list (first run or expired cache)."
          else
            echo "Restored dedupe cache (cache_hit=${{ steps.dedupe_cache.outputs.cache-hit }})."
            wc -c out/posted_deals.json
          fi

      - name: Set run options
        id: options
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "limit=${{ inputs.limit }}" >> "$GITHUB_OUTPUT"
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "telegram_flag=--dry-run" >> "$GITHUB_OUTPUT"
            else
              echo "telegram_flag=" >> "$GITHUB_OUTPUT"
            fi
            if [ "${{ inputs.skip_affiliate }}" = "true" ]; then
              echo "affiliate_flag=--skip-affiliate" >> "$GITHUB_OUTPUT"
            else
              echo "affiliate_flag=" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "limit=10" >> "$GITHUB_OUTPUT"
            echo "telegram_flag=" >> "$GITHUB_OUTPUT"
            echo "affiliate_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug run options
        run: |
          echo "Using config_path=config/brands-only-telegram.json"
          echo "Using limit=${{ steps.options.outputs.limit }}"
          echo "Using telegram_flag='${{ steps.options.outputs.telegram_flag }}'"
          echo "Using affiliate_flag='${{ steps.options.outputs.affiliate_flag }}'"

      - name: Run deals workflow
        run: |
          set -o pipefail
          python3 scripts/deals_channel.py \
            --config config/brands-only-telegram.json \
            --limit "${{ steps.options.outputs.limit }}" \
            --verbose \
            ${{ steps.options.outputs.telegram_flag }} \
            ${{ steps.options.outputs.affiliate_flag }} \
            2>&1 | tee run-summary.json

      - name: Ensure dedupe file exists before cache save
        if: always()
        run: |
          mkdir -p out
          if [ ! -f out/posted_deals.json ]; then
            echo '{"keys": []}' > out/posted_deals.json
          fi

      - name: Save dedupe state for next run
        if: always()
        uses: actions/cache/save@v4
        with:
          path: out/posted_deals.json
          key: deals-posted-${{ github.repository }}

      - name: Upload deal outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deals-output
          path: |
            out/messages.txt
            out/deals.csv
            out/posted_deals.json
          if-no-files-found: ignore
